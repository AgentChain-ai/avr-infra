services:
  avr-core:
    image: agentvoiceresponse/avr-core
    platform: linux/x86_64
    container_name: avr-core
    restart: always
    environment:
      - PORT=${CORE_PORT_START:-5000}
      - STS_URL=ws://avr-sts-deepgram:6033
    ports:
      - ${CORE_PORT_START:-5000}:${CORE_PORT_START:-5000}
    networks:
      - avr

  avr-sts-deepgram:
    image: agentvoiceresponse/avr-sts-deepgram
    platform: linux/x86_64
    container_name: avr-sts-deepgram
    restart: always
    environment:
      - PORT=6033
      - DEEPGRAM_API_KEY=$DEEPGRAM_API_KEY
      - AGENT_PROMPT=$AGENT_PROMPT
    networks:
      - avr

  avr-asterisk:
    image: agentvoiceresponse/avr-asterisk
    platform: linux/x86_64
    container_name: avr-asterisk
    restart: always
    ports:
      - ${ASTERISK_MANAGER_PORT:-5038}:${ASTERISK_MANAGER_PORT:-5038}
      - ${ASTERISK_SIP_PORT:-5060}:${ASTERISK_SIP_PORT:-5060}
      - ${ASTERISK_ARI_PORT:-8088}:${ASTERISK_ARI_PORT:-8088}
      - 10000-10050:10000-10050/udp
    volumes:
      - ./asterisk/conf/manager.conf:/etc/asterisk/my_manager.conf
      - ./asterisk/conf/pjsip.conf:/etc/asterisk/my_pjsip.conf
      - ./asterisk/conf/extensions.conf:/etc/asterisk/my_extensions.conf
      - ./asterisk/conf/queues.conf:/etc/asterisk/my_queues.conf
      - ./asterisk/conf/ari.conf:/etc/asterisk/my_ari.conf
    networks:
      - avr

  avr-ami:
    image: agentvoiceresponse/avr-ami
    platform: linux/x86_64
    container_name: avr-ami
    restart: always
    environment:
      - PORT=${AMI_PORT:-9000}
      - AMI_HOST=${AMI_HOST:-avr-asterisk}
      - AMI_PORT=${ASTERISK_MANAGER_PORT:-5038}
      - AMI_USERNAME=${AMI_USERNAME:-avr}
      - AMI_PASSWORD=${AMI_PASSWORD:-avr}
    ports:
      - ${AMI_PORT:-9000}:${AMI_PORT:-9000}
    networks:
      - avr

networks:
  avr:
    name: avr
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          